<aside class="w-64 bg-slate-900 text-white flex flex-col flex-shrink-0">
  <div class="p-5 border-b border-slate-700">
    <h1 class="text-xl font-bold tracking-wide">MOMS</h1>
    <p class="text-xs text-slate-400 mt-1">Military Organisation Mgmt</p>
  </div>

  <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
    <a routerLink="/dashboard" routerLinkActive="bg-slate-700 text-white"
       [routerLinkActiveOptions]="{ exact: true }"
       class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors text-sm font-medium">
      Dashboard
    </a>

    <div>
      <a routerLink="/personnel" routerLinkActive="bg-slate-700 text-white"
         [routerLinkActiveOptions]="{ exact: true }"
         class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors text-sm font-medium">
        Personnel
      </a>
      <a routerLink="/personnel/commands" routerLinkActive="bg-slate-600 text-white"
         class="flex items-center gap-3 pl-8 pr-4 py-1.5 rounded-lg text-slate-400 hover:bg-slate-700 hover:text-white transition-colors text-xs font-medium">
        Command Hierarchy
      </a>
    </div>

    <div>
      <a routerLink="/inventory" routerLinkActive="bg-slate-700 text-white"
         [routerLinkActiveOptions]="{ exact: true }"
         class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors text-sm font-medium">
        Inventory
      </a>
      <a routerLink="/inventory/stock" routerLinkActive="bg-slate-600 text-white"
         class="flex items-center gap-3 pl-8 pr-4 py-1.5 rounded-lg text-slate-400 hover:bg-slate-700 hover:text-white transition-colors text-xs font-medium">
        Stock Transactions
      </a>
      <a routerLink="/inventory/purchase-orders" routerLinkActive="bg-slate-600 text-white"
         class="flex items-center gap-3 pl-8 pr-4 py-1.5 rounded-lg text-slate-400 hover:bg-slate-700 hover:text-white transition-colors text-xs font-medium">
        Purchase Orders
      </a>
      <a routerLink="/inventory/assignments" routerLinkActive="bg-slate-600 text-white"
         class="flex items-center gap-3 pl-8 pr-4 py-1.5 rounded-lg text-slate-400 hover:bg-slate-700 hover:text-white transition-colors text-xs font-medium">
        Asset Assignments
      </a>
    </div>

    <div>
      <a routerLink="/finance" routerLinkActive="bg-slate-700 text-white"
         [routerLinkActiveOptions]="{ exact: true }"
         class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors text-sm font-medium">
        Finance
      </a>
      <a routerLink="/finance/income" routerLinkActive="bg-slate-600 text-white"
         class="flex items-center gap-3 pl-8 pr-4 py-1.5 rounded-lg text-slate-400 hover:bg-slate-700 hover:text-white transition-colors text-xs font-medium">
        Income
      </a>
      <a routerLink="/finance/budget" routerLinkActive="bg-slate-600 text-white"
         class="flex items-center gap-3 pl-8 pr-4 py-1.5 rounded-lg text-slate-400 hover:bg-slate-700 hover:text-white transition-colors text-xs font-medium">
        Budget
      </a>
      <a routerLink="/finance/expenses" routerLinkActive="bg-slate-600 text-white"
         class="flex items-center gap-3 pl-8 pr-4 py-1.5 rounded-lg text-slate-400 hover:bg-slate-700 hover:text-white transition-colors text-xs font-medium">
        Expenses
      </a>
      <a routerLink="/finance/ledger" routerLinkActive="bg-slate-600 text-white"
         class="flex items-center gap-3 pl-8 pr-4 py-1.5 rounded-lg text-slate-400 hover:bg-slate-700 hover:text-white transition-colors text-xs font-medium">
        Ledger
      </a>
    </div>

    <a routerLink="/reports" routerLinkActive="bg-slate-700 text-white"
       class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors text-sm font-medium">
      Reports
    </a>

    @if (isAdmin) {
      <div class="pt-2 border-t border-slate-700 mt-2">
        <p class="text-xs text-slate-500 px-4 py-1 uppercase tracking-wider">Administration</p>
        <a routerLink="/admin/users" routerLinkActive="bg-red-900 text-white"
           class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-300 hover:bg-red-900 hover:text-white transition-colors text-sm font-medium">
          User Management
        </a>
      </div>
    }
  </nav>

  <div class="p-4 border-t border-slate-700 text-xs text-slate-500">
    MOMS — Phase 6
  </div>
</aside>
