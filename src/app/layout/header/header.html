<header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between flex-shrink-0">
  <span class="text-sm font-medium text-gray-500 uppercase tracking-wider">
    Military Organisation Management System
  </span>
  <div class="flex items-center gap-3">
    <span class="text-sm text-gray-700 font-medium">{{ username }}</span>
    @if (role) {
      <span class="text-xs px-2 py-0.5 rounded-full font-semibold"
        [class]="role === 'ADMIN' ? 'bg-red-100 text-red-700' :
                 role === 'MANAGER' ? 'bg-blue-100 text-blue-700' :
                 'bg-gray-100 text-gray-600'">
        {{ role }}
      </span>
    }
    <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-white text-xs font-bold">
      {{ initial }}
    </div>
    <button
      (click)="logout()"
      class="text-sm text-gray-500 hover:text-red-600 transition font-medium px-2 py-1 rounded hover:bg-red-50">
      Sign out
    </button>
  </div>
</header>
