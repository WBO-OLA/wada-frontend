<header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between flex-shrink-0 gap-3">
  <div class="flex items-center gap-3 min-w-0">
    <!-- Hamburger — mobile only -->
    <button class="md:hidden flex-shrink-0 p-1.5 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors"
            (click)="layout.toggleSidebar()">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <span class="hidden sm:block text-sm font-medium text-gray-500 uppercase tracking-wider truncate">
      Military Organisation Management System
    </span>
    <span class="sm:hidden text-sm font-medium text-gray-700 font-bold">MOMS</span>
  </div>

  <div class="flex items-center gap-2 sm:gap-3 flex-shrink-0">
    <span class="hidden sm:block text-sm text-gray-700 font-medium">{{ username }}</span>
    @if (role) {
      <span class="text-xs px-2 py-0.5 rounded-full font-semibold hidden sm:block"
        [class]="role === 'ADMIN' ? 'bg-red-100 text-red-700' :
                 role === 'MANAGER' ? 'bg-blue-100 text-blue-700' :
                 'bg-gray-100 text-gray-600'">
        {{ role }}
      </span>
    }
    <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">
      {{ initial }}
    </div>
    <button
      (click)="logout()"
      class="text-xs sm:text-sm text-gray-500 hover:text-red-600 transition font-medium px-2 py-1 rounded hover:bg-red-50 whitespace-nowrap">
      <span class="hidden sm:inline">Sign out</span>
      <svg class="sm:hidden w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
    </button>
  </div>
</header>
