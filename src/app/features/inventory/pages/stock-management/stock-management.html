<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a routerLink="/inventory" class="text-gray-400 hover:text-gray-600 text-sm">← Inventory</a>
    <span class="text-gray-300">/</span>
    <h1 class="text-xl font-bold text-gray-900">Stock Movement</h1>
  </div>

  @if (successMessage()) {
    <div class="mb-4 p-3 bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg">
      {{ successMessage() }}
    </div>
  }
  @if (errorMessage()) {
    <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg">
      {{ errorMessage() }}
    </div>
  }

  <form [formGroup]="form" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-4">
    <div>
      <label class="block text-xs font-medium text-gray-700 mb-1">Item *</label>
      <select formControlName="itemId"
              class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-slate-400">
        <option [value]="null">Select item...</option>
        @for (item of items(); track item.id) {
          <option [value]="item.id">{{ item.name }} ({{ item.sku }}) — stock: {{ item.quantity }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-xs font-medium text-gray-700 mb-1">Warehouse *</label>
      <select formControlName="warehouseId"
              class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-slate-400">
        <option [value]="null">Select warehouse...</option>
        @for (w of warehouses(); track w.id) {
          <option [value]="w.id">{{ w.name }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-xs font-medium text-gray-700 mb-1">Quantity *</label>
      <input formControlName="quantity" type="number" min="1"
             class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Reference No.</label>
        <input formControlName="referenceNumber" type="text"
               class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Performed By</label>
        <input formControlName="performedBy" type="text"
               class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
      </div>
    </div>

    <div>
      <label class="block text-xs font-medium text-gray-700 mb-1">Notes</label>
      <textarea formControlName="notes" rows="2"
                class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 resize-none"></textarea>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="button" (click)="stockIn()" [disabled]="form.invalid || saving()"
              class="flex-1 py-2 bg-green-600 text-white text-sm font-medium rounded-lg hover:bg-green-700 disabled:opacity-50 transition-colors">
        Stock In (Receive)
      </button>
      <button type="button" (click)="stockOut()" [disabled]="form.invalid || saving()"
              class="flex-1 py-2 bg-red-600 text-white text-sm font-medium rounded-lg hover:bg-red-700 disabled:opacity-50 transition-colors">
        Stock Out (Issue)
      </button>
    </div>
  </form>
</div>
