<div class="min-h-screen bg-slate-900 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <!-- Logo / Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-700 mb-4">
        <svg class="w-8 h-8 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04
               A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622
               0-1.042-.133-2.052-.382-3.016z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">MOMS</h1>
      <p class="text-slate-400 text-sm mt-1">Military Organisation Management System</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-xl font-semibold text-gray-800 mb-6">Sign in to your account</h2>

      @if (error()) {
        <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
          {{ error() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input
            formControlName="username"
            type="text"
            placeholder="Enter your username"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none
                   focus:ring-2 focus:ring-slate-500 focus:border-transparent transition"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input
            formControlName="password"
            type="password"
            placeholder="Enter your password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none
                   focus:ring-2 focus:ring-slate-500 focus:border-transparent transition"
          />
        </div>

        <button
          type="submit"
          [disabled]="form.invalid || loading()"
          class="w-full py-2.5 px-4 bg-slate-800 hover:bg-slate-700 disabled:opacity-50
                 disabled:cursor-not-allowed text-white text-sm font-semibold rounded-lg transition"
        >
          @if (loading()) { Signing in… } @else { Sign In }
        </button>
      </form>
    </div>
  </div>
</div>
